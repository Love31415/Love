<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe0f0 0%, #ffc0d0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* 爱心背景 */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 80, 120, 0.6);
            font-size: 20px;
            animation: floatHeart 8s linear infinite;
            pointer-events: none;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .login-card {
            background: rgba(255, 245, 250, 0.94);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(255, 80, 120, 0.25);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            z-index: 10;
        }

        h2 {
            font-size: 2rem;
            color: #ff4d6d;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #ff8da1;
            margin-bottom: 2rem;
            font-weight: 500;
            border-bottom: 2px dashed #ffb7c5;
            display: inline-block;
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 1.8rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #b23b4e;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ffb7c5;
            border-radius: 60px;
            background: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: #ff4d6d;
            box-shadow: 0 0 0 3px rgba(255, 77, 109, 0.2);
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(255, 77, 109, 0.4);
        }

        button:hover {
            background: #e6395e;
            transform: translateY(-2px);
        }

        .error-msg {
            background: #ffe3e8;
            color: #d43f5c;
            padding: 10px;
            border-radius: 40px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
<div class="heart-bg" id="heartBg"></div>
<div class="login-card">
    <h2>🔐 密钥登录 💌</h2>
    <div class="sub">请输入您的专属密钥</div>
    <div id="errorMsg" class="error-msg">密钥错误，请重试 ❤️</div>
    <div class="input-group">
        <label>🔑 密钥</label>
        <input type="password" id="secretKey" placeholder="请输入密钥" autocomplete="off">
    </div>
    <button id="loginBtn">✨ 验证并登录 ✨</button>
</div>

<script>
    const CORRECT_KEY = "20250711";  // 请修改为您自己的密钥

    const loginBtn = document.getElementById('loginBtn');
    const keyInput = document.getElementById('secretKey');
    const errorDiv = document.getElementById('errorMsg');

    function performLogin() {
        const enteredKey = keyInput.value.trim();
        if (enteredKey === CORRECT_KEY) {
            // 登录成功，跳转到 测2.html
            window.location.href = "测2.html";
        } else {
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 2000);
            keyInput.value = '';
            keyInput.focus();
        }
    }

    loginBtn.addEventListener('click', performLogin);
    keyInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') performLogin();
    });

    // 动态爱心背景
    function createHearts() {
        const bg = document.getElementById('heartBg');
        const symbols = ['❤️', '💖', '💗', '💓', '💕', '💘', '🌸', '🌺'];
        for (let i = 0; i < 60; i++) {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            heart.style.fontSize = Math.floor(Math.random() * 28 + 14) + 'px';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 9 + 5 + 's';
            heart.style.animationDelay = Math.random() * 8 + 's';
            bg.appendChild(heart);
        }
        setInterval(() => {
            if (bg.children.length < 80) {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.fontSize = Math.floor(Math.random() * 28 + 12) + 'px';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = Math.random() * 9 + 5 + 's';
                bg.appendChild(heart);
                setTimeout(() => heart.remove(), 13000);
            }
        }, 2000);
    }
    createHearts();
</script>
</body>
</html>
